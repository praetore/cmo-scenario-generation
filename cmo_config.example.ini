[cmo]
cmo_install_dir = C:/Program Files (x86)/Steam/steamapps/common/Command Modern Operations
; optional override:
; db_dir = C:/Program Files (x86)/Steam/steamapps/common/Command Modern Operations/DB

; Optional: FlightAware AeroAPI integration (scripts/traffic_aeroapi.py, scripts/traffic_flights_to_cmo.py).
; Leave the section out (or api_key blank) to disable live civilian-traffic generation.
; The key can also be supplied via the AEROAPI_API_KEY environment variable.
[aeroapi]
api_key = YOUR_AEROAPI_KEY_HERE
